name: Windows Build

on:
  workflow_dispatch:

env:
  RUST_VERSION: "stable"
  FLUTTER_VERSION: "3.24.5"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  VERSION: "1.4.8"

jobs:
  generate-bridge:
    uses: ./.github/workflows/bridge.yml

  build-TempTopMostWindow:
    uses: ./.github/workflows/third-party-RustDeskTempTopMostWindow.yml
    strategy:
      fail-fast: false
      matrix:
        job:
          - target: windows-2022
            platform: x64
    with:
      upload-artifact: true
      target: ${{ matrix.job.target }}
      configuration: Release
      platform: ${{ matrix.job.platform }}
      target_version: Windows10

  # Windows Flutter build
  build-windows-flutter:
    name: Windows Flutter x64
    needs: [generate-bridge]
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: win-flutter

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        env:
          VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static
        shell: bash
        run: |
          if ! $VCPKG_ROOT/vcpkg \
            install \
            --triplet x64-windows-static \
            --x-install-root="$VCPKG_ROOT/installed"; then
            find "${VCPKG_ROOT}/" -name "*.log" | while read -r _1; do
              echo "$_1:"
              echo "======"
              cat "$_1"
              echo "======"
              echo ""
            done
            exit 1
          fi
          head -n 100 "${VCPKG_ROOT}/buildtrees/ffmpeg/build-x64-windows-static-rel-out.log" || true

      - uses: actions/download-artifact@v4
        with:
          name: bridge-artifact
          path: ./

      - name: Build Rust lib
        run: python build.py --portable --flutter --skip-portable-pack --hwcodec --vram

      - name: Build Flutter
        run: |
          cd flutter
          flutter pub get
          flutter build windows --release

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows-x64
          path: flutter/build/windows/x64/runner/Release/

  # Windows Portable (sciter, no Flutter)
  build-windows-portable:
    name: Windows Portable x64
    needs: [generate-bridge]
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: win-portable

      - uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        env:
          VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static
        shell: bash
        run: |
          if ! $VCPKG_ROOT/vcpkg \
            install \
            --triplet x64-windows-static \
            --x-install-root="$VCPKG_ROOT/installed"; then
            find "${VCPKG_ROOT}/" -name "*.log" | while read -r _1; do
              echo "$_1:"
              echo "======"
              cat "$_1"
              echo "======"
              echo ""
            done
            exit 1
          fi
          head -n 100 "${VCPKG_ROOT}/buildtrees/ffmpeg/build-x64-windows-static-rel-out.log" || true

      - name: Build
        run: python build.py --portable --hwcodec --vram
        continue-on-error: true

      - name: Find and upload portable exe
        shell: bash
        run: |
          mkdir -p output
          # The portable packer may output to libs/portable/ or resources/
          find . -name "rustdesk-*-win7-install.exe" -exec cp {} output/ \; 2>/dev/null || true
          # Also look for the portable packer itself
          find . -name "rustdesk-portable-packer.exe" -exec cp {} output/ \; 2>/dev/null || true
          ls -la output/ || echo "No files found"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows-portable
          path: output/
